<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rolox Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 40px; max-width: 520px; width: 90%; text-align: center; }
    h1 { color: #00a2ff; font-size: 2rem; margin-bottom: 8px; }
    p  { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; border: none; margin-bottom: 12px; text-decoration: none; }
    .btn-blue  { background: #00a2ff; color: #fff; }
    .btn-green { background: #1a6b1a; color: #7fff7f; }
    .btn-gray  { background: #2a2a2a; color: #aaa; font-size: 0.85rem; }
    .info { background: #222; border-radius: 8px; padding: 14px; margin-top: 20px; font-size: 0.8rem; color: #666; word-break: break-all; }
    .badge { display: inline-block; background: #00a2ff22; color: #00a2ff; border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="card">
  <h1>ROLOX</h1>
  <span class="badge">Launcher</span>
  <p id="lblName">Carregando...</p>

  <a id="btnHttps" class="btn btn-blue"  href="#" target="_blank">🌐 Abrir no navegador</a>
  <a id="btnRoblox" class="btn btn-green" href="#">▶ Abrir no Roblox</a>
  <a id="btnCommunity" class="btn btn-gray" href="#" target="_blank" style="display:none">👥 Ver Comunidade</a>

  <div class="info" id="infoBox">Aguardando parâmetros...</div>
</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const nameApp = params.get("name_app")   || "";
  const placeId = params.get("id_map")     || params.get("placeId") || "";
  const groupId = params.get("id_group")   || params.get("groupId") || "";
  const userId  = params.get("username")   || "";

  const lblName      = document.getElementById("lblName");
  const btnHttps     = document.getElementById("btnHttps");
  const btnRoblox    = document.getElementById("btnRoblox");
  const btnCommunity = document.getElementById("btnCommunity");
  const infoBox      = document.getElementById("infoBox");

  // ── Jogo ────────────────────────────────────────────
  if (placeId) {
    lblName.textContent   = nameApp || "Jogo Roblox";
    btnHttps.href         = `https://www.roblox.com/games/${placeId}`;
    btnRoblox.href        = `roblox://placeId=${placeId}`;
    btnRoblox.textContent = `▶ Jogar: ${nameApp || placeId}`;
    infoBox.textContent   = `placeId=${placeId}${userId ? " | usuário="+userId : ""}`;

    // Redireciona automaticamente para roblox:// após 1s
    setTimeout(() => { window.location.href = `roblox://placeId=${placeId}`; }, 1000);
  }

  // ── Comunidade / Grupo ───────────────────────────────
  else if (groupId) {
    lblName.textContent        = nameApp || "Comunidade Roblox";
    btnHttps.href              = `https://www.roblox.com/communities/${groupId}`;
    btnHttps.textContent       = "🌐 Ver Comunidade no navegador";
    btnRoblox.style.display    = "none";
    btnCommunity.style.display = "block";
    btnCommunity.href          = `https://www.roblox.com/communities/${groupId}`;
    btnCommunity.textContent   = `👥 ${nameApp || "Comunidade"}`;
    infoBox.textContent        = `groupId=${groupId}`;

    setTimeout(() => { window.location.href = `https://www.roblox.com/communities/${groupId}`; }, 1000);
  }

  // ── Perfil de usuário ────────────────────────────────
  else if (userId) {
    lblName.textContent  = `Perfil: ${userId}`;
    btnHttps.href        = `https://www.roblox.com/user.aspx?username=${userId}`;
    btnRoblox.style.display = "none";
    infoBox.textContent  = `username=${userId}`;
  }

  else {
    lblName.textContent = "Parâmetros não encontrados.";
    infoBox.textContent = "Use: ?name_app=NomeDoJogo&id_map=PLACEID";
  }
</script>
</body>
</html>
